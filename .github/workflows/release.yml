name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (for manual runs)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      RS_TORRENT_LIVE_TORRENT: ${{ secrets.RS_TORRENT_LIVE_TORRENT }}
      RS_TORRENT_LIVE_MAGNET: ${{ secrets.RS_TORRENT_LIVE_MAGNET }}
      RS_TORRENT_LIVE_RESUME_SOURCE: ${{ secrets.RS_TORRENT_LIVE_RESUME_SOURCE }}
      RS_TORRENT_LIVE_MULTI_FILE_TORRENT: ${{ secrets.RS_TORRENT_LIVE_MULTI_FILE_TORRENT }}
      RS_TORRENT_LIVE_UDP_TORRENT: ${{ secrets.RS_TORRENT_LIVE_UDP_TORRENT }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Run deterministic release-readiness checks
        run: ./scripts/release-readiness.sh

      - name: Summarize live acceptance configuration
        run: |
          {
            echo "## Live acceptance configuration"
            ./scripts/release-readiness.sh --explain-live
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run live acceptance checks when secrets are configured
        run: |
          if [ -n "${RS_TORRENT_LIVE_TORRENT}" ] && \
             [ -n "${RS_TORRENT_LIVE_MAGNET}" ] && \
             [ -n "${RS_TORRENT_LIVE_RESUME_SOURCE}" ] && \
             [ -n "${RS_TORRENT_LIVE_MULTI_FILE_TORRENT}" ] && \
             [ -n "${RS_TORRENT_LIVE_UDP_TORRENT}" ]; then
            ./scripts/release-readiness.sh --with-live
          else
            echo "[release] live acceptance skipped because one or more RS_TORRENT_LIVE_* secrets are not configured"
          fi

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag exists locally
        run: git fetch --tags --force

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: |
          gh release create "$TAG_NAME" \
            --verify-tag \
            --title "$TAG_NAME" \
            --notes-file CHANGELOG.md
